services:
  nmf-db:
    image: postgres:16-alpine
    container_name: nmf-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nameforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nameforge_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nameforge_dev}
    ports:
      - '5434:5432'
    volumes:
      - nmf-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nameforge} -d ${POSTGRES_DB:-nameforge_dev}']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nmf-net

  nmf-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: nmf-api
    restart: unless-stopped
    depends_on:
      nmf-db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: '3002'
      HOST: '0.0.0.0'
      DATABASE_URL: postgresql://${POSTGRES_USER:-nameforge}:${POSTGRES_PASSWORD:-nameforge_dev}@nmf-db:5432/${POSTGRES_DB:-nameforge_dev}
      DOMAIN_CONNECTOR: ${DOMAIN_CONNECTOR:-stub}
      RDAP_BOOTSTRAP_URL: ${RDAP_BOOTSTRAP_URL:-https://data.iana.org/rdap/dns.json}
      RDAP_TIMEOUT_MS: ${RDAP_TIMEOUT_MS:-8000}
      RDAP_CACHE_TTL_MS: ${RDAP_CACHE_TTL_MS:-3600000}
    ports:
      - '3002:3002'
    volumes:
      - ./api/src:/app/api/src
      - ./api/tests:/app/api/tests
    networks:
      - nmf-net

  nmf-web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: nmf-web
    restart: unless-stopped
    depends_on:
      - nmf-api
    environment:
      NODE_ENV: development
      VITE_API_PROXY_TARGET: http://nmf-api:3002
    ports:
      - '5180:5180'
    volumes:
      - ./web/src:/app/web/src
      - ./web/index.html:/app/web/index.html
      - ./web/vite.config.ts:/app/web/vite.config.ts
      - ./web/tailwind.config.js:/app/web/tailwind.config.js
      - ./web/postcss.config.js:/app/web/postcss.config.js
    networks:
      - nmf-net

volumes:
  nmf-db-data:

networks:
  nmf-net:
    driver: bridge
